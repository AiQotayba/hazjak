<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#16a34a" />
    <title>غير متصل — حجزك</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #ffffff;
        color: #111827;
        text-align: center;
      }
      img {
        border-radius: 1rem;
        box-shadow: 0 8px 24px rgba(22, 163, 74, 0.15);
      }
      h1 {
        margin: 1rem 0 0.5rem;
        font-size: 1.25rem;
      }
      p {
        margin: 0 0 1.25rem;
        color: #6b7280;
        font-size: 0.95rem;
        line-height: 1.6;
      }
      button {
        border: 0;
        border-radius: 999px;
        background: #16a34a;
        color: #fff;
        font-weight: 700;
        padding: 0.75rem 1.5rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div>
      <img src="/icon-192.png" width="72" height="72" alt="حجزك" />
      <h1>لا يوجد اتصال بالإنترنت</h1>
      <p>تحقق من الشبكة ثم أعد المحاولة. يمكنك فتح الصفحات التي زرتها سابقاً عند عودة الاتصال.</p>
      <button type="button" onclick="location.reload()">إعادة المحاولة</button>
    </div>
  </body>
</html>
