services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hazjak
      POSTGRES_PASSWORD: hazjak
      POSTGRES_DB: hazjak
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hazjak -d hazjak"]
      interval: 3s
      timeout: 5s
      retries: 10
    volumes:
      - hazjak_pg:/var/lib/postgresql/data

volumes:
  hazjak_pg:
